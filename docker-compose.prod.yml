# Prod stack. Images are cross-built for linux/amd64 on a dev machine and
# transferred to the server's Docker engine (docker save | ssh ... docker load),
# so the server runs them without a registry or local build:
#
#   # on the dev machine:
#   docker buildx bake -f docker-compose.prod.yml --set *.platform=linux/amd64 --load
#   docker save voltflow-collector-meter voltflow-collector-sma \
#     voltflow-collector-wallbox voltflow-backend voltflow-frontend \
#     | gzip | ssh <server> 'gunzip | docker load'
# (in practice use scripts/deploy.sh, which does all of this.)
#
#   # on the server (needs this file + .env + db/init.sql, no source tree):
#   docker compose -f docker-compose.prod.yml up -d
#
# Access: https://<server> (HTTP on :8080 redirects to HTTPS)
# ANKER credentials come from .env (ANKERUSER/ANKERPASSWORD/ANKERCOUNTRY).
# TLS cert is mkcert-issued for the local network - the ~/voltflow/ bundle on
# the server needs a certs/ dir alongside this file, containing voltflow.crt +
# voltflow.key (see apps/frontend/nginx.conf).

# Shared config for the three collector containers (one per device/protocol).
# Each collector image sets its own COLLECTOR env; only meter carries the
# Anker MQTT single-session constraint.
x-collector: &collector
  pull_policy: never
  restart: unless-stopped
  env_file: .env
  environment:
    DATABASE_URL: postgresql://${POSTGRES_USER:-voltflow}:${POSTGRES_PASSWORD:-voltflow}@db:5432/${POSTGRES_DB:-voltflow}
  depends_on:
    db:
      condition: service_healthy

services:
  db:
    image: timescale/timescaledb:2.28.1-pg16
    restart: unless-stopped
    mem_limit: 1g          # enough for TimescaleDB at this data volume
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-voltflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voltflow}
      POSTGRES_DB: ${POSTGRES_DB:-voltflow}
    volumes:
      - voltflow-db-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    # Loopback-only publish so the host-networked collector-sma can reach the DB
    # at 127.0.0.1:5432. Not exposed to the LAN. Other containers still use `db`.
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-voltflow} -d ${POSTGRES_DB:-voltflow}"]
      interval: 5s
      timeout: 5s
      retries: 10

  collector-meter:
    <<: *collector
    image: voltflow-collector-meter:latest
    build:
      context: ./apps/collector
      dockerfile: Dockerfile.meter
    mem_limit: 256m

  collector-sma:
    <<: *collector
    image: voltflow-collector-sma:latest
    build:
      context: ./apps/collector
      dockerfile: Dockerfile.sma
    mem_limit: 128m
    # SMA Speedwire is UDP/multicast and does NOT survive the Docker bridge NAT
    # (measured ~81% dropped reads vs 0% natively / for the TCP wallbox on the
    # same host). Host networking gives the collector direct L2 access to the
    # inverter. Trade-off: it can no longer resolve the `db` service name, so it
    # reaches the DB over the loopback port published by the db service below.
    network_mode: host
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-voltflow}:${POSTGRES_PASSWORD:-voltflow}@127.0.0.1:5432/${POSTGRES_DB:-voltflow}

  collector-wallbox:
    <<: *collector
    image: voltflow-collector-wallbox:latest
    build:
      context: ./apps/collector
      dockerfile: Dockerfile.wallbox
    mem_limit: 128m

  backend:
    image: voltflow-backend:latest
    pull_policy: never
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    mem_limit: 256m
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-voltflow}:${POSTGRES_PASSWORD:-voltflow}@db:5432/${POSTGRES_DB:-voltflow}
      PORT: 3000
    # Admin "System" tab: read-only host monitoring. The container list is read
    # from the Docker socket; load/memory/disk come from /proc + statfs on the
    # overlay (which maps to the host disk). The socket is owned by root:docker,
    # and the image runs as the non-root `node` user, so grant the container the
    # host's docker group via DOCKER_GID in the SERVER's .env (find it with
    # `getent group docker` — it is host-specific, 108 on ours; the 999 below is
    # only a fallback and is wrong as often as not). A wrong gid fails silently:
    # `docker query failed: EACCES /var/run/docker.sock` once in the log, then an
    # empty container list. deploy.sh does not push .env, so set it on the server.
    group_add:
      - "${DOCKER_GID:-999}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: voltflow-frontend:latest
    pull_policy: never
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    restart: unless-stopped
    mem_limit: 128m
    ports:
      - "8080:8080"
      - "443:8443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend

volumes:
  voltflow-db-data:
