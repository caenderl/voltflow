# Prod-Stack (läuft auf dem Raspberry Pi 5, arm64).
# Start:  docker compose -f docker-compose.prod.yml up -d --build
# Zugriff: http://<pi>:8080
#
# ANKER-Credentials kommen aus der .env (ANKERUSER/ANKERPASSWORD/ANKERCOUNTRY).
services:
  db:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    mem_limit: 1g          # reicht für TimescaleDB bei diesem Datenvolumen
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-poke}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-poke}
      POSTGRES_DB: ${POSTGRES_DB:-poke}
    volumes:
      - poke-db-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-poke} -d ${POSTGRES_DB:-poke}"]
      interval: 5s
      timeout: 5s
      retries: 10

  collector:
    build:
      context: ./apps/collector
      dockerfile: Dockerfile
    restart: unless-stopped
    mem_limit: 256m
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-poke}:${POSTGRES_PASSWORD:-poke}@db:5432/${POSTGRES_DB:-poke}
    depends_on:
      db:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    mem_limit: 256m
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-poke}:${POSTGRES_PASSWORD:-poke}@db:5432/${POSTGRES_DB:-poke}
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    restart: unless-stopped
    mem_limit: 128m
    ports:
      - "8080:8080"
    depends_on:
      - backend

volumes:
  poke-db-data:
