# Prod stack (runs on the Raspberry Pi 5, arm64).
# Start:  docker compose -f docker-compose.prod.yml up -d --build
# Access: http://<pi>:8080
#
# ANKER credentials come from .env (ANKERUSER/ANKERPASSWORD/ANKERCOUNTRY).
services:
  db:
    image: timescale/timescaledb:2.28.1-pg16
    restart: unless-stopped
    mem_limit: 1g          # enough for TimescaleDB at this data volume
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-voltflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voltflow}
      POSTGRES_DB: ${POSTGRES_DB:-voltflow}
    volumes:
      - voltflow-db-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-voltflow} -d ${POSTGRES_DB:-voltflow}"]
      interval: 5s
      timeout: 5s
      retries: 10

  collector:
    build:
      context: ./apps/collector
      dockerfile: Dockerfile
    restart: unless-stopped
    mem_limit: 256m
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-voltflow}:${POSTGRES_PASSWORD:-voltflow}@db:5432/${POSTGRES_DB:-voltflow}
    depends_on:
      db:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    mem_limit: 256m
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-voltflow}:${POSTGRES_PASSWORD:-voltflow}@db:5432/${POSTGRES_DB:-voltflow}
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    restart: unless-stopped
    mem_limit: 128m
    ports:
      - "8080:8080"
    depends_on:
      - backend

volumes:
  voltflow-db-data:
