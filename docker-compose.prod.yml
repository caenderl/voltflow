# Prod-Stack (läuft auf dem Raspberry Pi 5, arm64).
# Start:  docker compose -f docker-compose.prod.yml up -d --build
# Zugriff: http://<pi>:8080
#
# ANKER-Credentials kommen aus der .env (ANKERUSER/ANKERPASSWORD/ANKERCOUNTRY).
services:
  db:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: poke
      POSTGRES_PASSWORD: poke
      POSTGRES_DB: poke
    volumes:
      - poke-db-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poke -d poke"]
      interval: 5s
      timeout: 5s
      retries: 10

  collector:
    build:
      context: ./apps/collector
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://poke:poke@db:5432/poke
    depends_on:
      db:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://poke:poke@db:5432/poke
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  poke-db-data:
