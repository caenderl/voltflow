# Dev setup: only TimescaleDB runs in a container.
# Collector, backend and frontend run locally in dev (see README).
services:
  db:
    image: timescale/timescaledb:2.28.1-pg16
    container_name: voltflow-db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-voltflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voltflow}
      POSTGRES_DB: ${POSTGRES_DB:-voltflow}
    ports:
      - "5432:5432"
    volumes:
      - voltflow-db-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-voltflow} -d ${POSTGRES_DB:-voltflow}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  voltflow-db-data:
