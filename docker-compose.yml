# Dev setup: only TimescaleDB runs in a container.
# Collector, backend and frontend run locally in dev (see README).
services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: poke-db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-poke}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-poke}
      POSTGRES_DB: ${POSTGRES_DB:-poke}
    ports:
      - "5432:5432"
    volumes:
      - poke-db-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-poke} -d ${POSTGRES_DB:-poke}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  poke-db-data:
