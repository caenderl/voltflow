# Plain HTTP: redirect everything to HTTPS
server {
    listen 8080;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 8443 ssl;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # mkcert-issued cert for the local network (see certs/README or CLAUDE.md)
    ssl_certificate /etc/nginx/certs/voltflow.crt;
    ssl_certificate_key /etc/nginx/certs/voltflow.key;

    # Docker-internal DNS: resolve the upstream dynamically so that a backend
    # restart/redeploy (new container IP) does not cause a permanent 502.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Forward the REST API to the backend
    location /api/ {
        set $backend backend;
        proxy_pass http://$backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # WebSocket (socket.io) to the backend - with upgrade headers
    location /socket.io/ {
        set $backend backend;
        proxy_pass http://$backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Angular SPA: all remaining routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
