server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker-internes DNS: Upstream dynamisch auflösen, damit ein
    # Backend-Neustart/Redeploy (neue Container-IP) kein dauerhaftes 502 verursacht.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # REST-API ans Backend weiterreichen
    location /api/ {
        set $backend backend;
        proxy_pass http://$backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # WebSocket (socket.io) ans Backend - mit Upgrade-Headern
    location /socket.io/ {
        set $backend backend;
        proxy_pass http://$backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Angular-SPA: alle übrigen Routen auf index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
