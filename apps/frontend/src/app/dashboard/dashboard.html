<div class="dashboard" [class.live-view]="view() === 'live'">
  <header class="app-bar">
    <h1>
      <svg class="brand-ic" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M7 2v11h3v9l7-12h-4l4-8z" />
      </svg>
      Voltflow
    </h1>
    <div class="bar-right">
      <nav class="views" role="tablist">
        @for (v of views; track v.id) {
          <button
            class="tab"
            role="tab"
            [class.active]="view() === v.id"
            (click)="select(v.id)"
          >
            {{ v.label }}
          </button>
        }
      </nav>
      <button class="icon-btn" (click)="openConfig()" aria-label="Einstellungen">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.48.48 0 0 0-.48-.41h-3.84a.48.48 0 0 0-.48.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.48.48 0 0 0-.59.22L2.74 8.87a.48.48 0 0 0 .12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.39.3.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.48-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.49.49 0 0 0-.12-.61l-2.03-1.58zM12 15.6A3.6 3.6 0 1 1 12 8.4a3.6 3.6 0 0 1 0 7.2z" /></svg>
      </button>
      <span class="version-tag">v{{ appVersion }}</span>
    </div>
  </header>

  @if (view() === 'live') {
    <app-live-view
      [flow]="flow()"
      [today]="today()"
      [liveSpark]="liveSpark()"
      [wallboxState]="wallboxState()"
      [wallboxName]="wallboxName()"
      [smaState]="smaState()"
      [smaName]="smaName()"
      [balance]="balance()"
    />
  } @else {
    <app-history-view
      [view]="view()"
      [periodLabel]="periodLabel()"
      [canPrev]="canPrev()"
      [canNext]="canNext()"
      [energy]="energy()"
      [hasTariff]="hasTariff()"
      [costs]="costs()"
      [balance]="periodBalance()"
      [loading]="loading()"
      [error]="error()"
      [powerChart]="powerChart()"
      [energyChart]="energyChart()"
      [wallboxDailyChart]="wallboxDailyChart()"
      (prevClicked)="prev()"
      (nextClicked)="next()"
    />
  }

  @if (configOpen()) {
    <app-config-modal
      [tariff]="tariff()"
      [wallboxConfig]="wallboxConfig()"
      [smaConfig]="smaConfig()"
      [checkpoints]="checkpoints()"
      (closed)="closeConfig()"
      (saved)="onConfigSave($event)"
      (checkpointSaved)="onCheckpointSave($event)"
      (checkpointDeleted)="onCheckpointDelete($event)"
    />
  }
</div>
