<div class="scrim" (click)="closed.emit()"></div>
<div class="modal" role="dialog" aria-label="Einstellungen">
  <h2 class="modal-title">Einstellungen</h2>

  <div class="modal-body">
    <nav class="tabs">
      <button
        type="button"
        class="tab"
        [class.active]="activeTab() === 'tariff'"
        (click)="activeTab.set('tariff')"
      >
        Stromtarif
      </button>
      <button
        type="button"
        class="tab"
        [class.active]="activeTab() === 'wallbox'"
        (click)="activeTab.set('wallbox')"
      >
        Wallbox
      </button>
      <button
        type="button"
        class="tab"
        [class.active]="activeTab() === 'sma'"
        (click)="activeTab.set('sma')"
      >
        PV-Wechselrichter
      </button>
    </nav>

    <div class="tab-panel">
      @if (activeTab() === 'tariff') {
        <label class="field">
          <span>Anbieter</span>
          <input type="text" [(ngModel)]="formProvider" placeholder="z. B. Stadtwerke" />
        </label>
        <label class="field">
          <span>Verbrauch (ct/kWh)</span>
          <input type="number" min="0" step="0.01" [(ngModel)]="formImport" placeholder="z. B. 30" />
        </label>
        <label class="field">
          <span>Einspeisung (ct/kWh)</span>
          <input type="number" min="0" step="0.01" [(ngModel)]="formExport" placeholder="z. B. 8" />
        </label>
      }

      @if (activeTab() === 'wallbox') {
        <label class="field">
          <span>Name</span>
          <input type="text" [(ngModel)]="formWbName" placeholder="z. B. Garage" />
        </label>
        <label class="field-row">
          <input type="checkbox" [(ngModel)]="formWbEnabled" />
          <span>Wallbox aktivieren (Modbus TCP)</span>
        </label>
        <label class="field">
          <span>IP-Adresse</span>
          <input type="text" [(ngModel)]="formWbHost" placeholder="z. B. 192.168.0.206" />
        </label>
        <div class="field-grid">
          <label class="field">
            <span>Port</span>
            <input type="number" min="1" max="65535" [(ngModel)]="formWbPort" placeholder="502" />
          </label>
          <label class="field">
            <span>Unit-ID</span>
            <input type="number" min="0" max="255" [(ngModel)]="formWbUnitId" placeholder="1" />
          </label>
          <label class="field">
            <span>Intervall (s)</span>
            <input type="number" min="5" max="3600" [(ngModel)]="formWbInterval" placeholder="30" />
          </label>
        </div>
        <p class="hint-sm">Änderungen am Wallbox-Anschluss greifen nach einem Neustart des Collectors.</p>
      }

      @if (activeTab() === 'sma') {
        <label class="field">
          <span>Name</span>
          <input type="text" [(ngModel)]="formSmaName" placeholder="z. B. Dach" />
        </label>
        <label class="field-row">
          <input type="checkbox" [(ngModel)]="formSmaEnabled" />
          <span>Wechselrichter aktivieren (Speedwire)</span>
        </label>
        <div class="field-grid">
          <label class="field">
            <span>IP-Adresse</span>
            <input type="text" [(ngModel)]="formSmaHost" placeholder="z. B. 192.168.0.110" />
          </label>
          <label class="field">
            <span>Intervall (s)</span>
            <input type="number" min="5" max="3600" [(ngModel)]="formSmaInterval" placeholder="60" />
          </label>
        </div>
        <p class="hint-sm">
          Passwort wird aus <code>SMA_PASSWORD</code> (.env) gelesen. Änderungen greifen nach einem Neustart des
          Collectors.
        </p>
      }
    </div>
  </div>

  <div class="modal-actions">
    <button class="btn-text" (click)="closed.emit()">Abbrechen</button>
    <button class="btn-filled" (click)="save()">Speichern</button>
  </div>
</div>
