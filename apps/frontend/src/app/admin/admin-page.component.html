<div class="admin-page">
  <header class="admin-bar">
    <a class="back-link" routerLink="/live" aria-label="Zurück">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15.4 7.4 14 6l-6 6 6 6 1.4-1.4-4.6-4.6z" /></svg>
    </a>
    <h1>Einstellungen</h1>

    <nav class="admin-nav" role="tablist">
      <button
        type="button"
        id="tab-config"
        class="nav-item"
        role="tab"
        [attr.aria-selected]="activeTab() === 'config'"
        aria-controls="panel-admin"
        [class.active]="activeTab() === 'config'"
        (click)="activeTab.set('config')"
      >
        Konfiguration
      </button>
      <button
        type="button"
        id="tab-tariffs"
        class="nav-item"
        role="tab"
        [attr.aria-selected]="activeTab() === 'tariffs'"
        aria-controls="panel-admin"
        [class.active]="activeTab() === 'tariffs'"
        (click)="activeTab.set('tariffs')"
      >
        Tarife
      </button>
      <button
        type="button"
        id="tab-checkpoints"
        class="nav-item"
        role="tab"
        [attr.aria-selected]="activeTab() === 'checkpoints'"
        aria-controls="panel-admin"
        [class.active]="activeTab() === 'checkpoints'"
        (click)="activeTab.set('checkpoints')"
      >
        Zählerstände
      </button>
      <button
        type="button"
        id="tab-system"
        class="nav-item"
        role="tab"
        [attr.aria-selected]="activeTab() === 'system'"
        aria-controls="panel-admin"
        [class.active]="activeTab() === 'system'"
        (click)="activeTab.set('system')"
      >
        System
      </button>
    </nav>
  </header>

  <!-- Admin needs the desktop width; the entry point is hidden on phones, but a
       direct URL could still land here. -->
  <p class="mobile-note">Die Einstellungen sind nur am Desktop verfügbar.</p>

  <main
    id="panel-admin"
    class="admin-content"
    role="tabpanel"
    [attr.aria-labelledby]="'tab-' + activeTab()"
  >
    @switch (activeTab()) {
      @case ('config') {
        <app-config-section />
      }
      @case ('tariffs') {
        <app-tariffs-section />
      }
      @case ('checkpoints') {
        <app-checkpoints-section />
      }
      @case ('system') {
        <app-system-section />
      }
    }
  </main>
</div>
